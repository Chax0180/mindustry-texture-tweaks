item.phase-fabric.name = Phase Resin
item.phase-fabric.description = A hard, glassy material with a variety of unusual, conditional properties. Used in advanced electronics and self-repairing structures.

sector.karst.description = This sector is rich in resources, but will be attacked by the enemy once a new core lands.\nTake advantage of the resources and research [accent]phase resin[].
block.phase-weaver.name = Phase Polymerizer
block.phase-weaver.description = Synthesizes phase resin from thorium and sand.
block.mend-projector.description = Repairs blocks in its vicinity.\nOptionally uses phase resin to boost range and efficiency.
block.overdrive-projector.description = Increases the speed of nearby buildings.\nOptionally uses phase resin to boost range and efficiency. Does not stack.
block.overdrive-dome.description = Increases the speed of nearby buildings. Requires phase resin and silicon to operate. Does not stack.
block.phase-heater.description = Applies heat to structures. Requires phase resin.
block.phase-synthesizer.description = Synthesizes phase resin from thorium, sand, and ozone. Requires heat.
block.neoplasia-reactor.description = Uses arkycite, water and phase resin to generate large amounts of power. Produces heat and dangerous neoplasm as a byproduct.\nExplodes violently if neoplasm is not removed from the reactor via conduits.
block.regen-projector.description = Slowly repairs allied structures in a square perimeter. Requires hydrogen.\nOptionally uses phase resin to boost efficiency.
