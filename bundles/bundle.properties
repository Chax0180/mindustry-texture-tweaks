item.phase-fabric.name = Phase Resin
item.phase-fabric.description = A hard, glassy material with a variety of unusual, conditional properties. Used in advanced electronics and self-repairing structures.

sector.karst.description = This sector is rich in resources, but will be attacked by the enemy once a new core lands.\nTake advantage of the resources and research [accent]phase resin[].
block.phase-weaver.name = Phase Polymerizer
block.phase-weaver.description = Synthesizes phase resin from thorium and sand.
block.mend-projector.description = Repairs blocks in its vicinity.\nOptionally uses phase resin to boost range and efficiency.
block.overdrive-projector.description = Increases the speed of nearby buildings.\nOptionally uses phase resin to boost range and efficiency. Does not stack.
block.overdrive-dome.description = Increases the speed of nearby buildings. Requires phase resin and silicon to operate. Does not stack.
block.phase-heater.description = Applies heat to structures. Requires phase resin.
block.phase-synthesizer.description = Synthesizes phase resin from thorium, sand, and ozone. Requires heat.
block.neoplasia-reactor.description = Uses arkycite, water and phase resin to generate large amounts of power. Produces heat and dangerous neoplasm as a byproduct.\nExplodes violently if neoplasm is not removed from the reactor via conduits.
block.regen-projector.description = Slowly repairs allied structures in a square perimeter. Requires hydrogen.\nOptionally uses phase resin to boost efficiency.

item.copper.description = A ductile, conductive metal. Used in all sorts of construction and ammunition.
item.lead.description = A malleable, dense metal. Used in liquid transportation and electrical structures.
item.metaglass.description = A hard silicate material. Used in liquid distribution and storage structures.
item.graphite.description = A soft, dense, and conductive material. Used in electrical components and turret ammunition. Highly heat resistant.
item.sand.description = Finely ground rocks. Used for production of other refined materials.
item.coal.description = A heavy sedimentary rock. Used for fuel and refined material production.
item.titanium.description = A lightweight, robust metal. Used in liquid transportation structures, drills and factories.
item.thorium.description = A heavy, fissile metal. Used in durable structures and as nuclear fuel.
item.scrap.description = Mixed metal junk. Rich in resources; used in Melters and Pulverizers for recycling into other materials.
item.silicon.description = An extremely versatile refined resource. Used in solar panels, complex electronics, and homing turret ammunition.
item.plastanium.description = A flexible, lightweight alloy. Used in advanced units, insulation and fragmentation ammunition.
item.surge-alloy.description = An extremely strong, conductive alloy. Used in advanced weaponry and reactive defense structures.
item.spore-pod.description = A rubbery lump of biomass. Used for conversion into oil, explosives and fuel.
item.blast-compound.description = A chalky, oily rock-like material. Used in bombs and explosive ammunition.
item.pyratite.description = A dry, chalky rock-like material. Used in incendiary weapons and combustion-fueled generators.

item.beryllium.description = A heavy, versatile metal. Used in many types of construction and ammunition on Erekir. Extremely heat-resistant.
item.tungsten.description = An extremely dense metal. Used in drills, armor and ammunition. Required in the construction of more advanced structures. Exceedingly heat resistant.
item.oxide.description = A dusty, chalky material. Used as a heat conductor and insulator for power.
item.carbide.description = A hard, ceramic-like material. Used in advanced structures, heavier units, and ammunition. Exceedingly heat resistant.

liquid.water.description = An extremely common, versatile liquid. Used for cooling machines and waste processing.
liquid.slag.description = A rich, thick, searing hot liquid. Refined in separators into constituent metals. Consumed in liquid turrets as ammunition.
liquid.oil.description = A thick liquid composed of hydrocarbons. Used in advanced material production and as incendiary ammunition.
liquid.cryofluid.description = A freezing cold mixture. Used as coolant in reactors, turrets and factories.

liquid.arkycite.description = A dormant, biological liquid. Used in chemical reactions for power generation and material synthesis.
liquid.ozone.description = An uncommon, versatile gas. Used as fuel and an oxidizing agent in material production. Moderately explosive.
liquid.hydrogen.description = The most common element. Used in resource extraction, unit production and structure repair. Flammable.
liquid.cyanogen.description = A versatile, dangerous gas. Used for ammunition, construction of advanced units, and various reactions in advanced blocks. Highly flammable.
liquid.nitrogen.description = A common atmospheric gas. Used in resource extraction, gas creation and unit production. Inert.
liquid.neoplasm.description = A dangerous, artifical biological byproduct of the Neoplasia reactor. Quickly spreads to any adjacent water-containing block it touches, damaging them in the process. Viscous.

